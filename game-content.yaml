      # 任务简报 #02
      目标已确认。请根据图像中的视觉线索完成骇入。

       **情报摘要**: 
        71路公交线路为旧世界城市自我更新的血管枢纽，连接着多种建筑体。二十一世纪后半叶，随着城市更新计划的推进，该公交线路被废弃，是导致城市自我调节崩溃的重要原因。
       
        著名作品《第七十一区》中曾提及该线路的末班车，控诉人类禁止城市自我调节的行为，这种暴行最终使城市死亡成为不可避免的结局。

      - 警告: 请勿搭乘旧世界任何交通工具，可能存在未知风险。

  - id: page-3
    image: 3.png
    meta:
      longitude: 121.449180°E
      latitude: 31.225570°N
      captureTime: 公元2028纪年
      mission: 调查灯教会曾用于传教的建筑
    controls:
      - type: input
        label: 该建筑体拥有金色五角星数量为
        answer:
          - "3"
          - "holograven"
    briefing: |
      # 任务简报 #03
      《新千年城市备忘录》有言：灯之长生者以图书馆为庇护所，自二十世纪以来，其数量已随纸媒的消亡而骤减。然而历经两百年，仍有少量长生者在城市中活动，试图秘密与各地教团建立连接，展开无法被网络监控的未知危险活动。
      其集会所的特殊符号标志，以金色五角星为追奉辉光的象征。

      拥有该类五角星符号的地点是新灯教进行传教活动，公开语及怪力众神，吸引新信徒的场所。

      注意: 在您所到达的时空内，该教团可能依然活跃，请勿与其成员发生任何接触

      警告：请勿阅读任何纸质书籍，您需在任务结束后接受精神卫生所的检查。

  - id: page-4
    image: 4.png
    meta:
      longitude: 121.454467°E
      latitude: 31.228422°N
      captureTime: 公元2030纪年
      mission: 观测新增实体 Omega-0，一种米白色寄生体
    controls:
      - type: input
        label: 路牌右侧建筑外墙上的米白色寄生体数量为
        answer:
          - "33"
          - "holograven"
    briefing: |
      # 任务简报 #04

      信号源已定位。该区域内发现 **米白色寄生体**。

       在二十一世纪中期的城市大崩坏前后，滋生了不少数量的未知寄生生物，部分寄生体以城市建筑为宿主，形成了独特的共生关系。

       为研究城市生物多样性环境，ARC部门对这些寄生体进行了长期监测。近期观测到一个新型寄生体，暂命名为 **Omega-0**，其特征如下：

       米白色铁质感表面，呈现规则孔洞纹理，部分个体显示曾有微弱的生物活动迹象，产生循环噪声。

       建议: 优先计算目标数量，严禁直接接触或干扰其表面结构。

  - id: page-5
    image: 5.png
    meta:
      longitude: 121.455070°E
      latitude: 31.229147°N
      captureTime: 公元2028纪年
      mission: 破解城市被动物攻占的预言
    controls:
      - type: dropdown
        label: 这座屋子曾属于谁
        options:
          - 猫
          - 狗
          - 鹅
        answer: 鹅
    briefing: |
      # 任务简报 #05
      城市被动物攻占的预言？此类标题的报道近日在媒体上引起关注。
      城市生物学家曾在二十一世纪初提出过一个预言：随着城市生态系统的崩溃，动物将逐渐占领城市空间，成为新的主宰。

       目标建筑曾是一个普通的居民楼，但似乎已被大量的*占据。这些动物不仅在建筑周围活动，还进入了建筑内部，形成了一个独特的生态系统。

       任务要求：请确认该建筑曾属于哪种动物


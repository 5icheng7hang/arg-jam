      城市中心出现了巨型船只，通体银白，外观与普通邮轮无异，关于为何其出现于城市中心有关部门进行了多种猜测。
      一种合理解释为：该类船只的活动范围通常位于海洋，但形成了独特的洄游现象，每年春季进行穿越城区的集体运动。
      此时，所有地上交通工具会被迫停运，等待船群从中穿行。

      目标船只已进入可视范围。目前为上海城区仅存的一艘遗骸，请根据视觉线索完成识别。

